<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perception of Listening</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 24px;
}

main { width: 100%; }

h1 {
  font-size: clamp(1.3rem, 6vw, 4rem);
  letter-spacing: 0.08em;
  margin: 0 0 50px;
  white-space: nowrap;
}

#day {
  font-size: clamp(2rem, 6vw, 3rem);
  margin-bottom: 5px;
}

#project-label {
  font-size: clamp(0.8rem, 2vw, 1.2rem);
  letter-spacing: 0.2em;
  opacity: 0.8;
  margin-bottom: 50px;
}

#nowplaying {
  font-size: clamp(1rem, 4vw, 1.6rem);
  letter-spacing: 0.04em;
}

#track {
  display: block;
  margin-top: 18px;
}
</style>
</head>

<body>
<main>
  <h1>PERCEPTION OF LISTENING</h1>

  <div id="day"></div>

  <div id="project-label">OF THE PROJECT</div>

  <div id="nowplaying">
    <span>LISTENING NOW:</span>
    <span id="track">loading...</span>
  </div>
</main>

<script>
const startDate = new Date(2026, 2, 10);
const today = new Date();

startDate.setHours(0, 0, 0, 0);
today.setHours(0, 0, 0, 0);

const oneDay = 1000 * 60 * 60 * 24;
const diffDays = Math.round((today - startDate) / oneDay) + 1;

document.getElementById("day").textContent = "DAY " + diffDays;

async function getNowPlaying() {
  try {
    const response = await fetch("/api/now-playing");
    const data = await response.json();

    document.getElementById("track").textContent =
      data.track || "unavailable";
  } catch (error) {
    document.getElementById("track").textContent = "unavailable";
  }
}

getNowPlaying();
setInterval(getNowPlaying, 30000);
</script>

</body>
</html>
