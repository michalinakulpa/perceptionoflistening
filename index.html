<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perception of Listening</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  text-align: center;
  padding: 60px 24px 40px;
}

main {
  width: 100%;
  max-width: 900px;
}

#intro {
  max-width: 850px;
  margin: 0 auto 50px;
  font-size: clamp(0.75rem, 1.2vw, 0.95rem);
  line-height: 1.9;
  color: rgba(255,255,255,0.75);
}

#milestone {
  margin-top: 15px;
}

h1 {
  font-family: "Manrope", sans-serif;
  font-weight: 800;
  font-size: clamp(1.3rem, 6vw, 4rem);
  letter-spacing: 0.08em;
  margin: 0 0 60px;
  white-space: nowrap;
}

#day {
  font-size: clamp(2rem, 6vw, 3rem);
  margin-bottom: 5px;
}

#project-label {
  font-size: clamp(0.8rem, 2vw, 1.2rem);
  letter-spacing: 0.2em;
  opacity: 0.8;
  margin-bottom: 60px;
}

#nowplaying {
  font-size: clamp(1rem, 4vw, 1.6rem);
  letter-spacing: 0.04em;
}

#track {
  display: block;
  margin-top: 18px;
}

#source {
  margin-top: 20px;
  font-size: clamp(0.65rem, 2vw, 0.85rem);
  letter-spacing: 0.08em;
  opacity: 0.55;
}
</style>
</head>

<body>

<main>

  <div id="intro">
    <div>
      A long-duration art project exploring time and perception through continuous listening to a single band's music since March 10, 2026.
    </div>

    <div id="milestone">
      120,000 minutes reached on June 12, 2026.
    </div>
  </div>

  <h1>PERCEPTION OF LISTENING</h1>

  <div id="day"></div>

  <div id="project-label">OF THE PROJECT</div>

  <div id="nowplaying">
    <span id="label">LISTENING NOW:</span>
    <span id="track">loading...</span>
  </div>

  <div id="source">live listening data from Spotify</div>

</main>

<script>
const startDate = new Date(2026, 2, 10);
const today = new Date();

startDate.setHours(0, 0, 0, 0);
today.setHours(0, 0, 0, 0);

const oneDay = 1000 * 60 * 60 * 24;
const diffDays = Math.round((today - startDate) / oneDay) + 1;

document.getElementById("day").textContent = "DAY " + diffDays;

async function getNowPlaying() {
  try {
    const response = await fetch("/api/now-playing");
    const data = await response.json();

    document.getElementById("label").textContent =
      data.label || "LISTENING NOW:";

    document.getElementById("track").textContent =
      data.track || "unavailable";
  } catch (error) {
    document.getElementById("track").textContent = "unavailable";
  }
}

getNowPlaying();
setInterval(getNowPlaying, 30000);
</script>

</body>
</html>
